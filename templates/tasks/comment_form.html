{% extends 'base.html' %}
{% block title %}Edit Comment — TaskBoard{% endblock %}

{% block content %}
<div class="form-card">
  <h2>✏️ Edit Comment</h2>

  <form method="POST">
    {% csrf_token %}
    {% for field in form %}
      <div class="form-group">
        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
          <small style="color:var(--danger)">{{ field.errors|join:', ' }}</small>
        {% endif %}
      </div>
    {% endfor %}

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">💾 Save</button>
      <a href="javascript:history.back()" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
