{% extends 'base.html' %}
{% block title %}Delete Task — TaskBoard{% endblock %}

{% block content %}
<div class="delete-card">
  <div class="delete-icon">🗑️</div>
  <h2>Delete Task?</h2>
  <p>Are you sure you want to delete <strong>«{{ object.title }}»</strong>?<br>This action cannot be undone.</p>

  <form method="POST">
    {% csrf_token %}
    <div class="delete-actions">
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="{% url 'task-list' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
