{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Task manager — manage your tasks efficiently" />
  <title>{% block title %}TaskBoard{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}?v=3" />
</head>
<body>

  <nav class="navbar">
    <a href="{% url 'task-list' %}" class="navbar-brand">⚡ <span>TaskBoard</span></a>
    <div class="navbar-links">
      <a href="{% url 'task-list' %}">All Tasks</a>
      {% if user.is_authenticated %}
        <a href="{% url 'task-create' %}">+ Create</a>
      {% endif %}
    </div>
    <div class="navbar-user">
      {% if user.is_authenticated %}
        Hello, <strong>{{ user.username }}</strong>
      {% else %}
        <a href="/accounts/login/" class="btn btn-secondary" style="padding:.35rem .9rem">Login</a>
      {% endif %}
    </div>
  </nav>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

</body>
</html>
